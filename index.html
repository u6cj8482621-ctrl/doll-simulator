<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2D 娃娃背包包模擬器 (圖層完美融合版)</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f5f5f5;
            display: flex;
            height: 100vh;
            box-sizing: border-box;
            overflow: hidden;
            position: relative;
        }

        /* 手機版頂部工具列 */
        .mobile-header {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 50px;
            background-color: #ffffff;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            z-index: 99;
            align-items: center;
            padding: 0 15px;
            box-sizing: border-box;
        }

        .toggle-btn {
            background-color: #ffb6c1;
            color: #fff;
            border: none;
            padding: 8px 14px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.9rem;
        }

        /* 控制面板 */
        .control-panel {
            width: 360px;
            min-width: 360px;
            background-color: #ffffff;
            padding: 20px;
            box-shadow: 2px 0 5px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            gap: 15px;
            overflow-y: auto;
            z-index: 100;
            transition: transform 0.3s ease;
        }

        .close-sidebar-btn {
            display: none;
            background-color: #ccc;
            color: #333;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            align-self: flex-end;
            cursor: pointer;
        }

        h2 { margin: 0 0 5px 0; font-size: 1.4rem; color: #333; }
        .row-group { display: flex; gap: 12px; width: 100%; }
        .row-group .control-group { flex: 1; }
        .control-group { display: flex; flex-direction: column; gap: 6px; }
        
        .dynamic-group {
            background-color: #f9f9f9;
            padding: 12px;
            border-radius: 6px;
            border-left: 4px solid #ffb6c1;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        label { font-weight: bold; color: #555; font-size: 0.9rem; }
        select { padding: 8px; border-radius: 4px; border: 1px solid #ccc; font-size: 0.95rem; background-color: #fff; }
        /* 色票樣式 */
        .color-palette { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 2px; }
        .color-swatch {
            width: 30px;
            height: 30px;
            border-radius: 4px;
            border: 2px solid #ccc;
            cursor: pointer;
            transition: transform 0.1s;
        }
        .color-swatch:hover { transform: scale(1.1); }
        .color-swatch.active { border-color: #333; box-shadow: 0 0 4px rgba(0,0,0,0.3); }
        .skin-color-input { width: 100%; height: 42px; padding: 3px; border: 1px solid #ddd; border-radius: 8px; background: #fff; cursor: pointer; }
        .custom-skin-row { display: none; }

        /* 右側畫布區 */
        .display-area {
            flex: 1;
            background-color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: auto;
            padding: 20px;
        }

        /* 畫布固定 550x550，內部所有圖層全部 1:1 滿版絕對定位重疊，網頁絕不干涉你的圖檔原位置 */
        .canvas {
            position: relative;
            width: 550px;
            height: 550px;
            min-width: 550px;
            min-height: 550px;
            border: 2px solid #ccc;
            background-color: #fafafa;
            background-image: 
                linear-gradient(to right, #e8e8e8 1px, transparent 1px),
                linear-gradient(to bottom, #e8e8e8 1px, transparent 1px);
            background-size: 20px 20px;
        }

        .doll-stage { position: relative; width: 100%; height: 100%; }
        .doll-skin-fill {
            position: absolute;
            inset: 0;
            z-index: 0;
            background-color: #e3d2b9;
            pointer-events: none;
        }

        /* 1:1 圖層完美標準定位：寬高完全死鎖 100%，起點全部 (0,0)，直接疊加 */
        .layer-img {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: contain;
            top: 0;
            left: 0;
            pointer-events: none;
        }

        /* 頂層純黑線稿：使用正片疊底（multiply）完美與底下的顏色層融合，不擴散、不溢出 */
        .lineart-overlay {
            mix-blend-mode: multiply;
            z-index: 25;
        }

        .bag-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: auto;
            height: auto;
            pointer-events: none;
            transform-origin: center center;
        }

        /* ==================== 🛠️ 全瀏覽器相容 高精度特效濾鏡 ==================== */
        
        /* 1. 五金變色濾鏡（基於原本黑線稿 cat_hardware.png 的高級色調轉換） */
        .hw-gold   { filter: invert(34%) sepia(87%) saturate(464%) hue-rotate(5deg) brightness(110%) contrast(93%); } /* 質感金 */
        .hw-silver { filter: invert(80%) sepia(0%) saturate(0%) hue-rotate(0deg) brightness(105%) contrast(90%); }    /* 亮銀 */
        .hw-bronze { filter: invert(30%) sepia(40%) saturate(300%) hue-rotate(15deg) brightness(75%) contrast(85%); } /* 古銅 */
        .hw-black  { filter: invert(15%) sepia(0%) saturate(0%) hue-rotate(0deg) brightness(60%) contrast(95%); }     /* 槍黑 */

        /* 2. 表情工藝加工濾鏡（基於 cat_face_black.png 轉換） */
        .face-emboss       { filter: opacity(0.4) contrast(0.7) brightness(1.2); mix-blend-mode: multiply; }          /* 壓印：半透明自然凹陷感 */
        .face-foil-gold    { filter: invert(34%) sepia(87%) saturate(464%) hue-rotate(5deg) brightness(110%) contrast(93%); } /* 燙金-金 */
        .face-foil-silver  { filter: invert(80%) sepia(0%) saturate(0%) hue-rotate(0deg) brightness(105%) contrast(90%); }    /* 燙金-銀 */
        .face-foil-rose    { filter: invert(40%) sepia(30%) saturate(400%) hue-rotate(320deg) brightness(105%) contrast(90%); } /* 玫瑰金 */
        .face-foil-black   { filter: invert(0%) sepia(0%) saturate(0%) hue-rotate(0deg) brightness(10%) contrast(100%); }      /* 燙金-黑 */

        @media (max-width: 768px) {
            body { flex-direction: column; padding-top: 50px; }
            .mobile-header { display: flex; }
            .control-panel {
                position: fixed; top: 0; left: 0; height: 100vh; width: 300px;
                transform: translateX(-100%); box-shadow: 4px 0 10px rgba(0,0,0,0.2);
            }
            .control-panel.open { transform: translateX(0); }
            .close-sidebar-btn { display: block; }
            .display-area { width: 100%; height: calc(100vh - 50px); align-items: flex-start; }
        }
    </style>
</head>
<body>

    <div class="mobile-header">
        <button class="toggle-btn" onclick="toggleSidebar()">☰ 選單設定</button>
    </div>

    <div class="control-panel" id="sidebar">
        <button class="close-sidebar-btn" onclick="toggleSidebar()">✕ 收起選單</button>
        <h2>素體配件模擬器</h2>
        <hr style="border: 0; border-top: 1px solid #eee; margin: 0;">
        
        <div class="row-group">
            <div class="control-group">
                <label for="main-category">素體類型</label>
                <select id="main-category" onchange="updateSubCategory()">
                    <option value="12分" selected>12分娃</option>
                    <option value="棉花娃">棉花娃</option>
                </select>
            </div>
            <div class="control-group">
                <label for="skin-preset">膚色</label>
                <select id="skin-preset" onchange="handleSkinPresetChange()">
                    <option value="normal" selected>普肌</option>
                    <option value="white">白肌</option>
                    <option value="custom">自訂膚色</option>
                </select>
            </div>
        </div>
        <div id="custom-skin-row" class="control-group custom-skin-row">
            <label for="custom-skin-color">自訂膚色</label>
            <input id="custom-skin-color" class="skin-color-input" type="color" value="#e3d2b9" oninput="applySkinColor(this.value)">
        </div>

        <div class="control-group">
            <label for="sub-category">體型款式</label>
            <select id="sub-category" onchange="onDollOrBagChange()">
                </select>
        </div>

        <hr style="border: 0; border-top: 1px solid #eee; margin: 5px 0;">

        <div class="control-group">
            <label for="bag-style">包包款式</label>
            <select id="bag-style" onchange="onDollOrBagChange()">
                <option value="cat" selected>貓貓包</option>
            </select>
        </div>

        <div id="dynamic-options" class="dynamic-group">
            </div>
    </div>

    <div class="display-area">
        <div class="canvas">
            <div class="doll-stage">
                <div id="doll-skin-fill" class="doll-skin-fill"></div>
                <img id="doll-mask" class="layer-img" style="z-index: 1;" src="dolls/body_ob11.png" alt="娃娃素體">

                <img id="layer-main-color" class="bag-layer" style="z-index:10;" src="" alt="">

                <img id="layer-tuxedo-color" class="bag-layer" style="z-index:11; display:none;" src="" alt="">

                <img id="layer-calico" class="bag-layer" style="display:none; z-index:12;" src="" alt="">

                <img id="layer-main-line" class="bag-layer lineart-overlay" style="z-index:20;" src="" alt="">
                <img id="layer-tuxedo-line" class="bag-layer lineart-overlay" style="z-index:21; display:none;" src="" alt="">
                <img id="layer-face" class="bag-layer" style="z-index:22;" src="" alt="">
                <img id="layer-hardware" class="bag-layer" style="z-index:23;" src="" alt="">
            </div>
        </div>
    </div>

    <script>
        const paletteColors = [
            { name: '原皮色', hex: '#d4a373' },
            { name: '馬鞍棕', hex: '#b57c4c' },
            { name: '櫻花粉', hex: '#ffb6c1' },
            { name: '經典黑', hex: '#212529' },
            { name: '象牙白', hex: '#f8f9fa' },
            { name: '復古紅', hex: '#ae2012' },
            { name: '午夜藍', hex: '#1a5f7a' }
        ];

        let currentMainColor = '#d4a373';
        let currentTuxedoColor = '#f8f9fa';
        let currentHardware = 'hw-gold';
        let currentExpression = 'face-emboss';
        let currentCatPattern = 'pure';
        const STANDARD_CANVAS_SIZE_PX = 550;
        const LARGE_CANVAS_SIZE_PX = Math.round(STANDARD_CANVAS_SIZE_PX * (3262 / 2254));
        const OB11_REFERENCE_HEIGHT_CM = 12.5;
        const STANDARD_PX_PER_CM = (STANDARD_CANVAS_SIZE_PX * 0.6767) / OB11_REFERENCE_HEIGHT_CM;
        const BAG_IMAGE_RATIO = 397 / 316;
        const dollScalePresets = {
            'OB11': { canvasSizePx: STANDARD_CANVAS_SIZE_PX, pxPerCm: STANDARD_PX_PER_CM, bodyLeftRatio: 0.3762, bodyTopRatio: 0.2060, bagXcm: 3.81, bagYcm: 7.61, bagSizeCm: 3.0, bagRotationDeg: -4 },
            '黏土娃': { canvasSizePx: STANDARD_CANVAS_SIZE_PX, pxPerCm: (STANDARD_CANVAS_SIZE_PX * 0.6306) / 11.1, bodyLeftRatio: 0.3940, bodyTopRatio: 0.2567, bagXcm: 3.41, bagYcm: 6.87, bagSizeCm: 3.0, bagRotationDeg: -4 },
            '新 P9': { canvasSizePx: STANDARD_CANVAS_SIZE_PX, pxPerCm: STANDARD_PX_PER_CM, bodyLeftRatio: 0.3540, bodyTopRatio: 0.2034, bagXcm: 3.92, bagYcm: 7.67, bagSizeCm: 3.0, bagRotationDeg: -4 },
            '10cm': { canvasSizePx: STANDARD_CANVAS_SIZE_PX, pxPerCm: (STANDARD_CANVAS_SIZE_PX * 0.6708) / 10, bodyLeftRatio: 0.2848, bodyTopRatio: 0.2142, bagXcm: 4.95, bagYcm: 7.89, bagSizeCm: 3.0, bagRotationDeg: -4 },
            '20cm': { canvasSizePx: LARGE_CANVAS_SIZE_PX, pxPerCm: (LARGE_CANVAS_SIZE_PX * 0.7823) / 20, bodyLeftRatio: 0.2765, bodyTopRatio: 0.1422, bagXcm: 8.96, bagYcm: 13.26, bagSizeCm: 3.0, bagRotationDeg: -4 }
        };
        let bagCalibration = { xCm: 3.35, yCm: 6.70, sizeCm: 3.0, rotationDeg: -4 };
        let activeDollValue = 'OB11';

        const sidebar = document.getElementById('sidebar');
        const mainCategory = document.getElementById('main-category');
        const subCategory = document.getElementById('sub-category');
        const skinFill = document.getElementById('doll-skin-fill');
        const skinPreset = document.getElementById('skin-preset');
        const customSkinRow = document.getElementById('custom-skin-row');
        const customSkinColor = document.getElementById('custom-skin-color');
        const dollMask = document.getElementById('doll-mask');
        const canvas = document.querySelector('.canvas');

        function toggleSidebar() { sidebar.classList.toggle('open'); }

        function updateSubCategory() {
            const selectedMain = mainCategory.value;
            subCategory.innerHTML = '';
            const opts = selectedMain === '12分' ? ['OB11', '黏土娃', '新 P9'] : ['10cm', '20cm'];
            opts.forEach(opt => {
                let el = document.createElement('option'); el.value = opt; el.textContent = opt;
                subCategory.appendChild(el);
            });
            onDollOrBagChange();
        }

        function applySkinColor(color) {
            skinFill.style.backgroundColor = color;
            if (skinPreset.value === 'custom') customSkinColor.value = color;
            dollMask.style.filter = "none";
        }

        function handleSkinPresetChange() {
            const isCustom = skinPreset.value === 'custom';
            customSkinRow.style.display = isCustom ? 'flex' : 'none';
            const presetColors = { normal: '#e3d2b9', white: '#e5dbcc' };
            applySkinColor(isCustom ? customSkinColor.value : presetColors[skinPreset.value]);
        }

        function resetBagCalibrationForDoll() {
            const preset = dollScalePresets[subCategory.value] || dollScalePresets['OB11'];
            bagCalibration = {
                xCm: preset.bagXcm,
                yCm: preset.bagYcm,
                sizeCm: preset.bagSizeCm,
                rotationDeg: preset.bagRotationDeg
            };
        }

        function onDollOrBagChange() {
            const imageMapping = {
                'OB11': 'dolls/body_ob11.png',
                '黏土娃': 'dolls/body_Nendoroid_Doll.png',
                '新 P9': 'dolls/body_p9.png',
                '10cm': 'dolls/body_10cm.png',
                '20cm': 'dolls/body_20cm.png'
            };
            dollMask.src = imageMapping[subCategory.value];
            const preset = dollScalePresets[subCategory.value] || dollScalePresets['OB11'];
            canvas.style.width = `${preset.canvasSizePx}px`;
            canvas.style.height = `${preset.canvasSizePx}px`;
            canvas.style.minWidth = `${preset.canvasSizePx}px`;
            canvas.style.minHeight = `${preset.canvasSizePx}px`;
            if (activeDollValue !== subCategory.value) {
                activeDollValue = subCategory.value;
                resetBagCalibrationForDoll();
            }

            renderControlPanel();
            refreshLayers();
        }

        function updateBagCalibration(key, value) {
            bagCalibration[key] = Number(value);
            const valueEl = document.getElementById(`${key}-value`);
            if (valueEl) {
                valueEl.textContent = key === 'rotationDeg' ? `${bagCalibration[key]}°` : `${bagCalibration[key].toFixed(1)} cm`;
            }
            applyBagPlacement();
        }

        function renderRangeControl(key, label, min, max, step, suffix) {
            const value = bagCalibration[key];
            const display = key === 'rotationDeg' ? `${value}°` : `${value.toFixed(1)} ${suffix}`;
            return `
                <div class="control-group">
                    <div class="range-head">
                        <label for="${key}-range">${label}</label>
                        <span class="range-value" id="${key}-value">${display}</span>
                    </div>
                    <input id="${key}-range" type="range" min="${min}" max="${max}" step="${step}" value="${value}" oninput="updateBagCalibration('${key}', this.value)">
                </div>
            `;
        }

        function renderControlPanel() {
            const panel = document.getElementById('dynamic-options');
            panel.innerHTML = `
                <div class="control-group">
                    <label>花色款式</label>
                    <select id="cat-pattern-select" onchange="currentCatPattern=this.value; onDollOrBagChange();">
                        <option value="pure" ${currentCatPattern==='pure'?'selected':''}>純色款</option>
                        <option value="tuxedo" ${currentCatPattern==='tuxedo'?'selected':''}>賓士款</option>
                        <option value="calico" ${currentCatPattern==='calico'?'selected':''}>固定色-三花款</option>
                    </select>
                </div>
                <div id="color-pickers-zone"></div>
                <hr style="border: 0; border-top: 1px solid #e6e6e6; margin: 2px 0;">
                <div class="control-group">
                    <label>五金顏色</label>
                    <select onchange="currentHardware=this.value; refreshLayers();">
                        <option value="hw-gold" ${currentHardware==='hw-gold'?'selected':''}>純亮金</option>
                        <option value="hw-silver" ${currentHardware==='hw-silver'?'selected':''}>亮銀色</option>
                        <option value="hw-bronze" ${currentHardware==='hw-bronze'?'selected':''}>復古古銅</option>
                        <option value="hw-black" ${currentHardware==='hw-black'?'selected':''}>質感槍黑</option>
                    </select>
                </div>
                <div class="control-group">
                    <label>燙金/壓印加工</label>
                    <select onchange="currentExpression=this.value; refreshLayers();">
                        <option value="face-none" ${currentExpression==='face-none'?'selected':''}>無加工</option>
                        <option value="face-emboss" ${currentExpression==='face-emboss'?'selected':''}>凹凸壓印</option>
                        <option value="face-foil-gold" ${currentExpression==='face-foil-gold'?'selected':''}>經典燙金</option>
                        <option value="face-foil-silver" ${currentExpression==='face-foil-silver'?'selected':''}>極光燙銀</option>
                        <option value="face-foil-rose" ${currentExpression==='face-foil-rose'?'selected':''}>玫瑰金</option>
                        <option value="face-foil-black" ${currentExpression==='face-foil-black'?'selected':''}>個性黑金</option>
                    </select>
                </div>
            `;

            const zone = document.getElementById('color-pickers-zone');
            if (currentCatPattern === 'pure') {
                zone.innerHTML = `<div class="control-group"><label>包包主體顏色</label><div class="color-palette" id="main-pal"></div></div>`;
                buildPalette('main-pal', 'main');
            } else if (currentCatPattern === 'tuxedo') {
                zone.innerHTML = `
                    <div class="control-group"><label>1. 包包底色</label><div class="color-palette" id="main-pal"></div></div>
                    <div class="control-group" style="margin-top:5px;"><label>2. 賓士區塊顏色</label><div class="color-palette" id="tux-pal"></div></div>
                `;
                buildPalette('main-pal', 'main');
                buildPalette('tux-pal', 'tuxedo');
            } else if (currentCatPattern === 'calico') {
                zone.innerHTML = `<div class="control-group"><label>包包底色</label><div class="color-palette" id="main-pal"></div></div>`;
                buildPalette('main-pal', 'main');
            }
        }

        function buildPalette(targetId, type) {
            const target = document.getElementById(targetId);
            if(!target) return;
            paletteColors.forEach(color => {
                const swatch = document.createElement('div');
                swatch.className = 'color-swatch';
                swatch.style.backgroundColor = color.hex;
                
                if(type === 'main' && color.hex === currentMainColor) swatch.classList.add('active');
                if(type === 'tuxedo' && color.hex === currentTuxedoColor) swatch.classList.add('active');

                swatch.onclick = function() {
                    target.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
                    swatch.classList.add('active');
                    if(type === 'main') { currentMainColor = color.hex; }
                    if(type === 'tuxedo') { currentTuxedoColor = color.hex; }
                    refreshLayers();
                };
                target.appendChild(swatch);
            });
        }

        // 精準將色票 hex 轉換為完美的純色填充濾鏡
        function hexToFilter(hex) {
            return `drop-shadow(0px 0px 0px ${hex}) drop-shadow(0px 0px 0px ${hex}) drop-shadow(0px 0px 0px ${hex}) brightness(1.0) contrast(1.0)`;
        }

        function applyBagPlacement() {
            const preset = dollScalePresets[subCategory.value] || dollScalePresets['OB11'];
            const pxPerCm = preset.pxPerCm;
            const widthPx = bagCalibration.sizeCm * pxPerCm;
            const heightPx = widthPx / BAG_IMAGE_RATIO;
            const originX = preset.canvasSizePx * preset.bodyLeftRatio;
            const originY = preset.canvasSizePx * preset.bodyTopRatio;
            const leftPx = originX + (bagCalibration.xCm * pxPerCm) - (widthPx / 2);
            const topPx = originY + (bagCalibration.yCm * pxPerCm) - (heightPx / 2);
            const layerIds = [
                'layer-main-color',
                'layer-tuxedo-color',
                'layer-calico',
                'layer-main-line',
                'layer-tuxedo-line',
                'layer-face',
                'layer-hardware'
            ];

            layerIds.forEach(id => {
                const layer = document.getElementById(id);
                layer.style.width = `${widthPx}px`;
                layer.style.height = `${heightPx}px`;
                layer.style.left = `${leftPx}px`;
                layer.style.top = `${topPx}px`;
                layer.style.transform = `rotate(${bagCalibration.rotationDeg}deg)`;
            });
        }

        function refreshLayers() {
            const imgPath = 'bags/cat/';
            
            // 著色底層 DOM
            const lMainColor = document.getElementById('layer-main-color');
            const lTuxColor = document.getElementById('layer-tuxedo-color');
            const lCalico = document.getElementById('layer-calico');
            
            // 頂層黑色線稿 DOM
            const lMainLine = document.getElementById('layer-main-line');
            const lTuxLine = document.getElementById('layer-tuxedo-line');
            const lFace = document.getElementById('layer-face');
            const lHardware = document.getElementById('layer-hardware');

            if (currentCatPattern === 'calico') {
                lCalico.style.display = 'block';
                lCalico.src = `${imgPath}cat_calico.png`;

                lMainColor.style.display = 'block';
                lMainColor.src = `${imgPath}cat_main.png`;
                lMainColor.style.filter = hexToFilter(currentMainColor);
                lMainLine.style.display = 'block';
                lMainLine.src = `${imgPath}cat_main.png`;
                lTuxColor.style.display = 'none';
                lTuxLine.style.display = 'none';
            } else {
                lCalico.style.display = 'none';
                
                // 1. 渲染主體：底層用 filter 刷上飽和的實色，頂層蓋上原本的純黑去背線稿
                lMainColor.style.display = 'block';
                lMainColor.src = `${imgPath}cat_main.png`;
                lMainColor.style.filter = hexToFilter(currentMainColor);

                lMainLine.style.display = 'block';
                lMainLine.src = `${imgPath}cat_main.png`;

                // 2. 渲染賓士區塊
                if (currentCatPattern === 'tuxedo') {
                    lTuxColor.style.display = 'block';
                    lTuxColor.src = `${imgPath}cat_patch_tuxedo.png`;
                    lTuxColor.style.filter = hexToFilter(currentTuxedoColor);

                    lTuxLine.style.display = 'block';
                    lTuxLine.src = `${imgPath}cat_patch_tuxedo.png`;
                } else {
                    lTuxColor.style.display = 'none';
                    lTuxLine.style.display = 'none';
                }
            }

            // 3. 表情加工變色（利用覆蓋全網頁支援的精準反轉色矩陣）
            if (currentExpression === 'face-none') {
                lFace.style.display = 'none';
            } else {
                lFace.style.display = 'block';
                lFace.src = `${imgPath}cat_face_black.png`;
                lFace.className = `bag-layer ${currentExpression}`;
            }

            // 4. 五金加工變色（利用覆蓋全網頁支援的精準反轉色矩陣）
            lHardware.src = `${imgPath}cat_hardware.png`;
            lHardware.className = `bag-layer ${currentHardware}`;

            applyBagPlacement();
        }

        window.onload = function() {
            updateSubCategory();
            handleSkinPresetChange();
        }
    </script>
</body>
</html>
