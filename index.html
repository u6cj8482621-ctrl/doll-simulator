<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2D 娃娃背包包模擬器</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f5f5f5;
            display: flex;
            gap: 20px;
            height: 100vh;
            box-sizing: border-box;
        }

        /* 左側控制面板 */
        .control-panel {
            width: 350px;
            background-color: #ffffff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            gap: 15px;
            overflow-y: auto;
        }

        h2 {
            margin: 0 0 5px 0;
            font-size: 1.5rem;
            color: #333;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .dynamic-group {
            background-color: #f9f9f9;
            padding: 12px;
            border-radius: 6px;
            border-left: 4px solid #ffb6c1;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        label {
            font-weight: bold;
            color: #555;
            font-size: 0.95rem;
        }

        select {
            padding: 8px;
            border-radius: 4px;
            border: 1px solid #ccc;
            font-size: 1rem;
            width: 100%;
            background-color: #fff;
        }

        /* 色票區塊樣式 */
        .color-palette {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 4px;
        }

        .color-swatch {
            width: 35px;
            height: 35px;
            border-radius: 4px;
            border: 2px solid #ccc;
            cursor: pointer;
            transition: transform 0.1s, border-color 0.1s;
        }

        .color-swatch:hover {
            transform: scale(1.1);
        }

        .color-swatch.active {
            border-color: #333;
            box-shadow: 0 0 4px rgba(0,0,0,0.3);
        }

        /* 右側顯示區域 */
        .display-area {
            flex: 1;
            background-color: #ffffff;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        /* 1*1CM 淺灰色線條背景畫布 */
        .canvas {
            position: relative;
            width: 500px;
            height: 500px;
            border: 2px solid #ccc;
            background-color: #fafafa;
            background-image: 
                linear-gradient(to right, #e8e8e8 1px, transparent 1px),
                linear-gradient(to bottom, #e8e8e8 1px, transparent 1px);
            background-size: 38px 38px; 
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 娃娃素體容器 */
        .doll-container {
            position: absolute;
            bottom: 90px;
            transition: all 0.2s ease;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 膚色色塊（遮色片） */
        .doll-skin {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 30px;
            background-color: #fcd7b8; 
            transition: background-color 0.2s;
            z-index: 1;
        }

        /* 素體線稿 */
        .doll-outline {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 30px;
            border: 3px solid #4a4a4a;
            box-sizing: border-box;
            z-index: 2;
            box-shadow: inset 0 -15px 0 rgba(0,0,0,0.05);
        }

        /* 包包與背帶總容器 */
        .bag-system {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none;
        }

        /* 斜背帶線條 */
        .strap {
            position: absolute;
            width: 140px;
            height: 5px;
            background-color: #d2b48c; 
            top: 40%;
            left: 10%;
            transform: rotate(35deg);
            transform-origin: left center;
            transition: background-color 0.2s;
            border: 1px solid #4a4a4a;
            box-sizing: border-box;
        }

        /* 固定在側邊的包包本體 */
        .bag-unit {
            position: absolute;
            right: 5px;
            bottom: 25px;
            width: 70px;
            height: 60px;
            background-color: #ffd700;
            border: 2px solid #4a4a4a;
            transition: all 0.2s;
            position: absolute;
        }

        /* 貓耳形狀模擬（利用偽元素） */
        .bag-unit.cat-shape {
            border-radius: 50% 50% 40% 40%;
        }
        .bag-unit.cat-shape::before, .bag-unit.cat-shape::after {
            content: '';
            position: absolute;
            top: -6px;
            width: 0;
            height: 0;
            border-left: 10px solid transparent;
            border-right: 10px solid transparent;
