<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2D 娃娃背包包模擬器 (圖層完美融合版)</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f5f5f5;
            display: flex;
            height: 100vh;
            box-sizing: border-box;
            overflow: hidden;
            position: relative;
        }

        /* 手機版頂部工具列 */
        .mobile-header {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 50px;
            background-color: #ffffff;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            z-index: 99;
            align-items: center;
            padding: 0 15px;
            box-sizing: border-box;
        }

        .toggle-btn {
            background-color: #ffb6c1;
            color: #fff;
            border: none;
            padding: 8px 14px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.9rem;
        }

        /* 控制面板 */
        .control-panel {
            width: 360px;
            min-width: 360px;
            background-color: #ffffff;
            padding: 20px;
            box-shadow: 2px 0 5px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            gap: 15px;
            overflow-y: auto;
            z-index: 100;
            transition: transform 0.3s ease;
        }

        .close-sidebar-btn {
            display: none;
            background-color: #ccc;
            color: #333;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            align-self: flex-end;
            cursor: pointer;
        }

        h2 { margin: 0 0 5px 0; font-size: 1.4rem; color: #333; }
        .row-group { display: flex; gap: 12px; width: 100%; }
        .row-group .control-group { flex: 1; }
        .control-group { display: flex; flex-direction: column; gap: 6px; }
        
        .dynamic-group {
            background-color: #f9f9f9;
            padding: 12px;
            border-radius: 6px;
            border-left: 4px solid #ffb6c1;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        label { font-weight: bold; color: #555; font-size: 0.9rem; }
        select { padding: 8px; border-radius: 4px; border: 1px solid #ccc; font-size: 0.95rem; background-color: #fff; }
        /* 色票樣式 */
        .color-palette { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 2px; }
        .color-swatch {
            width: 30px;
            height: 30px;
            border-radius: 4px;
            border: 2px solid #ccc;
            cursor: pointer;
            transition: transform 0.1s;
        }
        .color-swatch:hover { transform: scale(1.1); }
        .color-swatch.active { border-color: #333; box-shadow: 0 0 4px rgba(0,0,0,0.3); }
        .custom-color-swatch {
            width: 68px;
            height: 34px;
            box-sizing: border-box;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #fff;
            color: #d62828;
            font-size: 0.9rem;
            font-weight: 700;
            line-height: 1;
            padding: 0;
            font-family: inherit;
        }
        .custom-color-input {
            position: absolute;
            width: 1px;
            height: 1px;
            opacity: 0;
            pointer-events: none;
        }
        .skin-color-input { width: 100%; height: 42px; padding: 3px; border: 1px solid #ddd; border-radius: 8px; background: #fff; cursor: pointer; }
        .custom-skin-row { display: none; }
        .custom-body-controls {
            display: none;
            flex-direction: column;
            gap: 10px;
            padding: 12px 0;
            border-top: 1px solid #eee;
            border-bottom: 1px solid #eee;
        }
        .custom-body-note { margin: 0; color: #777; font-size: 0.78rem; line-height: 1.4; }
        .custom-body-control { display: grid; grid-template-columns: 1fr auto; gap: 4px 10px; align-items: center; }
        .custom-body-control input[type="range"] { grid-column: 1 / -1; width: 100%; accent-color: #ff8fa3; }
        .custom-body-value { color: #777; font-size: 0.82rem; font-variant-numeric: tabular-nums; }
        .reset-custom-body {
            min-height: 36px;
            border: 1px solid #ccc;
            border-radius: 4px;
            background: #fff;
            color: #444;
            cursor: pointer;
        }
        #custom-body-host { position: absolute; inset: 0; z-index: 1; pointer-events: none; }

        /* 右側畫布區 */
        .display-area {
            flex: 1;
            background-color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: auto;
            padding: 20px;
        }

        .preview-layout {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .reference-gallery {
            display: grid;
            gap: 12px;
            width: 190px;
        }

        .reference-gallery[hidden] { display: none; }

        .reference-slot {
            width: 190px;
            aspect-ratio: 1;
            overflow: hidden;
            border: 1px solid #ccc;
            background: #fafafa;
        }

        .reference-slot img {
            display: block;
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* 畫布固定 550x550，內部所有圖層全部 1:1 滿版絕對定位重疊，網頁絕不干涉你的圖檔原位置 */
        .canvas {
            position: relative;
            width: 550px;
            height: 550px;
            min-width: 550px;
            min-height: 550px;
            border: 2px solid #ccc;
            background-color: #fafafa;
            background-image: 
                linear-gradient(to right, #e8e8e8 1px, transparent 1px),
                linear-gradient(to bottom, #e8e8e8 1px, transparent 1px);
            background-size: 20px 20px;
        }

        .doll-stage { position: relative; width: 100%; height: 100%; }
        .doll-skin-fill {
            position: absolute;
            inset: 0;
            z-index: 0;
            background-color: #e3d2b9;
            pointer-events: none;
        }

        /* 1:1 圖層完美標準定位：寬高完全死鎖 100%，起點全部 (0,0)，直接疊加 */
        .layer-img {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: contain;
            top: 0;
            left: 0;
            pointer-events: none;
        }

        /* 頂層純黑線稿：使用正片疊底（multiply）完美與底下的顏色層融合，不擴散、不溢出 */
        .lineart-overlay {
            mix-blend-mode: multiply;
            z-index: 25;
        }

        .bag-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: auto;
            height: auto;
            pointer-events: none;
            transform-origin: center center;
        }

        .strap-layer {
            position: absolute;
            z-index: 8;
            border-radius: 999px;
            pointer-events: none;
            transform-origin: left center;
        }

        /* 表情工藝加工濾鏡（基於 cat_face_black.png 轉換） */
        .face-emboss       { filter: opacity(0.4) contrast(0.7) brightness(1.2); mix-blend-mode: multiply; }          /* 壓印：半透明自然凹陷感 */
        .face-foil-gold    { filter: invert(34%) sepia(87%) saturate(464%) hue-rotate(5deg) brightness(110%) contrast(93%); } /* 燙金-金 */
        .face-foil-silver  { filter: invert(80%) sepia(0%) saturate(0%) hue-rotate(0deg) brightness(105%) contrast(90%); }    /* 燙金-銀 */
        .face-foil-rose    { filter: invert(40%) sepia(30%) saturate(400%) hue-rotate(320deg) brightness(105%) contrast(90%); } /* 玫瑰金 */
        .face-foil-black   { filter: invert(0%) sepia(0%) saturate(0%) hue-rotate(0deg) brightness(10%) contrast(100%); }      /* 燙金-黑 */

        @media (max-width: 768px) {
            body { flex-direction: column; padding-top: 50px; }
            .mobile-header { display: flex; }
            .control-panel {
                position: fixed; top: 0; left: 0; height: 100vh; width: 300px;
                transform: translateX(-100%); box-shadow: 4px 0 10px rgba(0,0,0,0.2);
            }
            .control-panel.open { transform: translateX(0); }
            .close-sidebar-btn { display: block; }
            .display-area { width: 100%; height: calc(100vh - 50px); align-items: flex-start; }
            .preview-layout { flex-direction: column; }
            .reference-gallery {
                grid-template-columns: repeat(3, minmax(0, 1fr));
                width: min(550px, calc(100vw - 24px));
            }
            .reference-slot { width: auto; }
        }
    </style>
</head>
<body>

    <div class="mobile-header">
        <button class="toggle-btn" onclick="toggleSidebar()">☰ 選單設定</button>
    </div>

    <div class="control-panel" id="sidebar">
        <button class="close-sidebar-btn" onclick="toggleSidebar()">✕ 收起選單</button>
        <h2>素體配件模擬器</h2>
        <hr style="border: 0; border-top: 1px solid #eee; margin: 0;">
        
        <div class="row-group">
            <div class="control-group">
                <label for="main-category">素體類型</label>
                <select id="main-category" onchange="updateSubCategory()">
                    <option value="12分" selected>12分娃</option>
                    <option value="棉花娃">棉花娃</option>
                </select>
            </div>
            <div class="control-group">
                <label for="skin-preset">膚色</label>
                <select id="skin-preset" onchange="handleSkinPresetChange()">
                    <option value="normal" selected>普肌</option>
                    <option value="white">白肌</option>
                    <option value="custom">自訂膚色</option>
                </select>
            </div>
        </div>
        <div id="custom-skin-row" class="control-group custom-skin-row">
            <label for="custom-skin-color">自訂膚色</label>
            <input id="custom-skin-color" class="skin-color-input" type="color" value="#e3d2b9" oninput="applySkinColor(this.value)">
        </div>

        <div class="control-group">
            <label for="sub-category">素體款式</label>
            <select id="sub-category" onchange="onDollOrBagChange()">
                </select>
        </div>

        <div id="custom-body-controls" class="custom-body-controls">
            <p class="custom-body-note">OB11 線稿參考版。數值為估算公分，預覽不取代實測。</p>
            <div class="custom-body-control">
                <label for="custom-torso">體長</label>
                <span class="custom-body-value"><span id="custom-torso-value">+0.0</span> cm</span>
                <input id="custom-torso" type="range" min="-5" max="5" step="0.1" value="0">
            </div>
            <div class="custom-body-control">
                <label for="custom-upper-arm">上臂長</label>
                <span class="custom-body-value"><span id="custom-upper-arm-value">+0.0</span> cm</span>
                <input id="custom-upper-arm" type="range" min="-5" max="5" step="0.1" value="0">
            </div>
            <div class="custom-body-control">
                <label for="custom-forearm">下臂長</label>
                <span class="custom-body-value"><span id="custom-forearm-value">+0.0</span> cm</span>
                <input id="custom-forearm" type="range" min="-5" max="5" step="0.1" value="0">
            </div>
            <div class="custom-body-control">
                <label for="custom-thigh">大腿長</label>
                <span class="custom-body-value"><span id="custom-thigh-value">+0.0</span> cm</span>
                <input id="custom-thigh" type="range" min="-5" max="5" step="0.1" value="0">
            </div>
            <div class="custom-body-control">
                <label for="custom-shin">小腿長</label>
                <span class="custom-body-value"><span id="custom-shin-value">+0.0</span> cm</span>
                <input id="custom-shin" type="range" min="-5" max="5" step="0.1" value="0">
            </div>
            <button id="reset-custom-body" class="reset-custom-body" type="button">重置尺寸</button>
        </div>

        <hr style="border: 0; border-top: 1px solid #eee; margin: 5px 0;">

        <div class="control-group">
            <label for="bag-style">包包款式</label>
            <select id="bag-style" onchange="onDollOrBagChange()">
                <option value="cat" selected>貓貓包</option>
                <option value="toast">吐司包</option>
                <option value="mini_messenger">小型郵差包</option>
                <option value="cylinder">圓筒包</option>
            </select>
        </div>

        <div id="dynamic-options" class="dynamic-group">
            </div>
    </div>

    <div class="display-area">
        <div class="preview-layout">
        <div class="canvas">
            <div class="doll-stage">
                <div id="doll-skin-fill" class="doll-skin-fill"></div>
                <img id="doll-mask" class="layer-img" style="z-index: 1;" src="dolls/body_ob11.png" alt="娃娃素體">
                <div id="custom-body-host" style="display:none;"></div>
                <div id="layer-strap" class="strap-layer"></div>

                <canvas id="layer-main-color" class="bag-layer" width="397" height="316" style="z-index:10;"></canvas>

                <canvas id="layer-tuxedo-color" class="bag-layer" width="397" height="316" style="z-index:11; display:none;"></canvas>

                <img id="layer-calico" class="bag-layer" style="display:none; z-index:12;" src="" alt="">
                <canvas id="layer-hardware" class="bag-layer" width="397" height="316" style="z-index:18;"></canvas>

                <img id="layer-main-line" class="bag-layer lineart-overlay" style="z-index:20;" src="" alt="">
                <img id="layer-tuxedo-line" class="bag-layer lineart-overlay" style="z-index:21; display:none;" src="" alt="">
                <img id="layer-face" class="bag-layer" style="z-index:22;" src="" alt="">
            </div>
        </div>
        <aside id="reference-gallery" class="reference-gallery" aria-label="實品參考圖片" hidden>
            <div class="reference-slot"><img id="reference-image-1" loading="lazy" alt="包包實品參考圖一"></div>
            <div class="reference-slot"><img id="reference-image-2" loading="lazy" alt="包包實品參考圖二"></div>
            <div class="reference-slot"><img id="reference-image-3" loading="lazy" alt="對應素體實品參考圖"></div>
        </aside>
        </div>
    </div>

    <script>
        const paletteColors = [
            { name: '原皮色', hex: '#d4a373' },
            { name: '馬鞍棕', hex: '#b57c4c' },
            { name: '櫻花粉', hex: '#ffb6c1' },
            { name: '經典黑', hex: '#212529' },
            { name: '象牙白', hex: '#f8f9fa' },
            { name: '復古紅', hex: '#ae2012' },
            { name: '午夜藍', hex: '#1a5f7a' },
            { name: '森林綠', hex: '#52796f' },
            { name: '奶油黃', hex: '#e9c46a' },
            { name: '薰衣草', hex: '#b8a1c9' }
        ];
        const hardwareColors = {
            'hw-gold': '#ffe898',
            'hw-silver': '#d4d5d7',
            'hw-bronze': '#6f6446',
            'hw-black': '#424039'
        };

        let currentMainColor = '#d4a373';
        let currentCylinderColor = '#f8f9fa';
        let currentTuxedoColor = '#f8f9fa';
        let currentHardware = 'hw-gold';
        let currentExpression = 'face-none';
        let currentCatPattern = 'pure';
        const STANDARD_CANVAS_SIZE_PX = 550;
        const LARGE_CANVAS_SIZE_PX = Math.round(STANDARD_CANVAS_SIZE_PX * (3262 / 2254));
        const OB11_REFERENCE_HEIGHT_CM = 12.5;
        const STANDARD_PX_PER_CM = (STANDARD_CANVAS_SIZE_PX * 0.6767) / OB11_REFERENCE_HEIGHT_CM;
        const bagStyleConfigs = {
            cat: { imageRatio: 397 / 316, strapAnchor: { xRatio: 0.045, yRatio: 0.04 }, strapColor: null },
            toast: { imageRatio: 378 / 354, strapAnchor: { xRatio: 0.064, yRatio: 0.22 }, strapColor: '#481502' },
            mini_messenger: { imageRatio: 383 / 363, strapAnchor: { xRatio: 0.075, yRatio: 0.025 }, strapColor: null },
            cylinder: { imageRatio: 330 / 263, strapAnchor: { xRatio: 0.075, yRatio: 0.08 }, strapColor: null }
        };
        const STRAP_WIDTH_CM = 0.22;
        const STRAP_LENGTH_RATIOS = { '10cm': 0.72, '20cm': 0.70 };
        const dollScalePresets = {
            'OB11': { canvasSizePx: STANDARD_CANVAS_SIZE_PX, pxPerCm: STANDARD_PX_PER_CM, bodyLeftRatio: 0.3762, bodyTopRatio: 0.2060, strapShoulderXRatio: 0.46, strapShoulderYRatio: 0.43, bagXcm: 3.81, bagYcm: 7.61, bagSizeCm: 3.0, bagRotationDeg: -4 },
            '黏土娃': { canvasSizePx: STANDARD_CANVAS_SIZE_PX, pxPerCm: (STANDARD_CANVAS_SIZE_PX * 0.6306) / 11.1, bodyLeftRatio: 0.3940, bodyTopRatio: 0.2567, strapShoulderXRatio: 0.46, strapShoulderYRatio: 0.47, bagXcm: 3.41, bagYcm: 6.87, bagSizeCm: 3.0, bagRotationDeg: -4 },
            'P9': { canvasSizePx: STANDARD_CANVAS_SIZE_PX, pxPerCm: STANDARD_PX_PER_CM, bodyLeftRatio: 0.3540, bodyTopRatio: 0.2034, strapShoulderXRatio: 0.322, strapShoulderYRatio: 0.376, bagXcm: 3.92, bagYcm: 7.67, bagSizeCm: 3.0, bagRotationDeg: -4 },
            '自訂尺寸': { canvasSizePx: STANDARD_CANVAS_SIZE_PX, pxPerCm: STANDARD_PX_PER_CM, bodyLeftRatio: 0.3762, bodyTopRatio: 0.2060, strapShoulderXRatio: 0.46, strapShoulderYRatio: 0.43, bagXcm: 3.81, bagYcm: 7.61, bagSizeCm: 3.0, bagRotationDeg: -4 },
            '10cm': { canvasSizePx: STANDARD_CANVAS_SIZE_PX, pxPerCm: (STANDARD_CANVAS_SIZE_PX * 0.6708) / 10, bodyLeftRatio: 0.2848, bodyTopRatio: 0.2142, strapShoulderXRatio: 0.300, strapShoulderYRatio: 0.530, bagXcm: 4.95, bagYcm: 7.89, bagSizeCm: 3.0, bagRotationDeg: -4 },
            '20cm': { canvasSizePx: LARGE_CANVAS_SIZE_PX, pxPerCm: (LARGE_CANVAS_SIZE_PX * 0.7823) / 20, bodyLeftRatio: 0.2765, bodyTopRatio: 0.1422, strapShoulderXRatio: 0.283, strapShoulderYRatio: 0.467, bagXcm: 8.96, bagYcm: 14.86, bagSizeCm: 3.0, bagRotationDeg: -4 }
        };
        let bagCalibration = { xCm: 3.35, yCm: 6.70, sizeCm: 3.0, rotationDeg: -4 };
        let activeDollValue = 'OB11';

        const sidebar = document.getElementById('sidebar');
        const mainCategory = document.getElementById('main-category');
        const subCategory = document.getElementById('sub-category');
        const bagStyle = document.getElementById('bag-style');
        const skinFill = document.getElementById('doll-skin-fill');
        const skinPreset = document.getElementById('skin-preset');
        const customSkinRow = document.getElementById('custom-skin-row');
        const customSkinColor = document.getElementById('custom-skin-color');
        const dollMask = document.getElementById('doll-mask');
        const canvas = document.querySelector('.canvas');

        function toggleSidebar() { sidebar.classList.toggle('open'); }

        function updateSubCategory() {
            const selectedMain = mainCategory.value;
            subCategory.innerHTML = '';
            const opts = selectedMain === '12分' ? ['OB11', '黏土娃', 'P9', '自訂尺寸'] : ['10cm', '20cm'];
            opts.forEach(opt => {
                let el = document.createElement('option'); el.value = opt; el.textContent = opt;
                subCategory.appendChild(el);
            });
            onDollOrBagChange();
        }

        function applySkinColor(color) {
            skinFill.style.backgroundColor = color;
            if (skinPreset.value === 'custom') customSkinColor.value = color;
            dollMask.style.filter = "none";
            if (typeof window.updateCustomBodySkin === 'function') {
                window.updateCustomBodySkin(color);
            }
        }

        function handleSkinPresetChange() {
            const isCustom = skinPreset.value === 'custom';
            customSkinRow.style.display = isCustom ? 'flex' : 'none';
            const presetColors = { normal: '#e3d2b9', white: '#e5dbcc' };
            applySkinColor(isCustom ? customSkinColor.value : presetColors[skinPreset.value]);
        }

        function resetBagCalibrationForDoll() {
            const preset = dollScalePresets[subCategory.value] || dollScalePresets['OB11'];
            bagCalibration = {
                xCm: preset.bagXcm,
                yCm: preset.bagYcm,
                sizeCm: preset.bagSizeCm,
                rotationDeg: preset.bagRotationDeg
            };
        }

        function onDollOrBagChange() {
            const imageMapping = {
                'OB11': 'dolls/body_ob11.png',
                '黏土娃': 'dolls/body_Nendoroid_Doll.png',
                'P9': 'dolls/body_p9.png',
                '10cm': 'dolls/body_10cm.png',
                '20cm': 'dolls/body_20cm.png'
            };
            const isCustomBody = subCategory.value === '自訂尺寸';
            if (!isCustomBody) dollMask.src = imageMapping[subCategory.value];
            dollMask.style.display = isCustomBody ? 'none' : 'block';
            skinFill.style.display = isCustomBody ? 'none' : 'block';
            skinPreset.disabled = false;
            customSkinColor.disabled = false;
            handleSkinPresetChange();
            if (typeof window.setCustomBodyActive === 'function') {
                window.setCustomBodyActive(isCustomBody);
            }
            const preset = dollScalePresets[subCategory.value] || dollScalePresets['OB11'];
            canvas.style.width = `${preset.canvasSizePx}px`;
            canvas.style.height = `${preset.canvasSizePx}px`;
            canvas.style.minWidth = `${preset.canvasSizePx}px`;
            canvas.style.minHeight = `${preset.canvasSizePx}px`;
            if (activeDollValue !== subCategory.value) {
                activeDollValue = subCategory.value;
                resetBagCalibrationForDoll();
            }

            renderControlPanel();
            refreshLayers();
            updateReferenceGallery();
        }

        function updateBagCalibration(key, value) {
            bagCalibration[key] = Number(value);
            const valueEl = document.getElementById(`${key}-value`);
            if (valueEl) {
                valueEl.textContent = key === 'rotationDeg' ? `${bagCalibration[key]}°` : `${bagCalibration[key].toFixed(1)} cm`;
            }
            applyBagPlacement();
        }

        function renderRangeControl(key, label, min, max, step, suffix) {
            const value = bagCalibration[key];
            const display = key === 'rotationDeg' ? `${value}°` : `${value.toFixed(1)} ${suffix}`;
            return `
                <div class="control-group">
                    <div class="range-head">
                        <label for="${key}-range">${label}</label>
                        <span class="range-value" id="${key}-value">${display}</span>
                    </div>
                    <input id="${key}-range" type="range" min="${min}" max="${max}" step="${step}" value="${value}" oninput="updateBagCalibration('${key}', this.value)">
                </div>
            `;
        }

        function renderControlPanel() {
            const panel = document.getElementById('dynamic-options');
            if (bagStyle.value === 'toast') {
                panel.innerHTML = `
                    <div class="control-group">
                        <label>背帶顏色</label>

                            <option value="hw-silver" ${currentHardware==='hw-silver'?'selected':''}>銀</option>
                            <option value="hw-bronze" ${currentHardware==='hw-bronze'?'selected':''}>古銅</option>

            }
            if (bagStyle.value === 'cylinder') {
                panel.innerHTML = `
                    <div class="control-group">
                        <label>包包主體顏色</label>
                        <div class="color-palette" id="main-pal"></div>
                    </div>
                    <div class="control-group">
                        <label>五金顏色</label>
                        <select onchange="currentHardware=this.value; refreshLayers();">
                            <option value="hw-gold" ${currentHardware==='hw-gold'?'selected':''}>金</option>
                            <option value="hw-silver" ${currentHardware==='hw-silver'?'selected':''}>銀</option>
                            <option value="hw-bronze" ${currentHardware==='hw-bronze'?'selected':''}>古銅</option>
                            <option value="hw-black" ${currentHardware==='hw-black'?'selected':''}>槍黑</option>
                        </select>
                    </div>
                `;
                buildPalette('main-pal', 'cylinder');
                return;
            }
            panel.innerHTML = `
                <div class="control-group">
                    <label>花色款式</label>
                    <select id="cat-pattern-select" onchange="currentCatPattern=this.value; onDollOrBagChange();">
                        <option value="pure" ${currentCatPattern==='pure'?'selected':''}>純色款</option>
                        <option value="tuxedo" ${currentCatPattern==='tuxedo'?'selected':''}>賓士款</option>
                        <option value="calico" ${currentCatPattern==='calico'?'selected':''}>固定色-三花款</option>
                    </select>
                </div>
                <div id="color-pickers-zone"></div>
                <hr style="border: 0; border-top: 1px solid #e6e6e6; margin: 2px 0;">
                <div class="control-group">
                    <label>五金顏色</label>
                    <select onchange="currentHardware=this.value; refreshLayers();">
                        <option value="hw-gold" ${currentHardware==='hw-gold'?'selected':''}>金</option>
                        <option value="hw-silver" ${currentHardware==='hw-silver'?'selected':''}>銀</option>
                        <option value="hw-bronze" ${currentHardware==='hw-bronze'?'selected':''}>古銅</option>
                        <option value="hw-black" ${currentHardware==='hw-black'?'selected':''}>槍黑</option>
                    </select>
                </div>
                <div class="control-group">
                    <label>燙金/壓印加工</label>
                    <select onchange="currentExpression=this.value; refreshLayers();">
                        <option value="face-none" ${currentExpression==='face-none'?'selected':''}>無加工</option>
                        <option value="face-emboss" ${currentExpression==='face-emboss'?'selected':''}>壓印</option>
                        <option value="face-foil-gold" ${currentExpression==='face-foil-gold'?'selected':''}>燙金-金</option>
                        <option value="face-foil-silver" ${currentExpression==='face-foil-silver'?'selected':''}>燙金-銀</option>
                        <option value="face-foil-rose" ${currentExpression==='face-foil-rose'?'selected':''}>燙金-玫瑰金</option>
                        <option value="face-foil-black" ${currentExpression==='face-foil-black'?'selected':''}>燙金-黑</option>
                    </select>
                </div>
            `;

            const zone = document.getElementById('color-pickers-zone');
            if (currentCatPattern === 'pure') {
                zone.innerHTML = `<div class="control-group"><label>包包主體顏色</label><div class="color-palette" id="main-pal"></div></div>`;
                buildPalette('main-pal', 'main');
            } else if (currentCatPattern === 'tuxedo') {
                zone.innerHTML = `
                    <div class="control-group"><label>1. 包包底色</label><div class="color-palette" id="main-pal"></div></div>
                    <div class="control-group" style="margin-top:5px;"><label>2. 賓士區塊顏色</label><div class="color-palette" id="tux-pal"></div></div>
                `;
                buildPalette('main-pal', 'main');
                buildPalette('tux-pal', 'tuxedo');
            } else if (currentCatPattern === 'calico') {
                zone.innerHTML = `<div class="control-group"><label>包包底色</label><div class="color-palette" id="main-pal"></div></div>`;
                buildPalette('main-pal', 'main');
            }
        }

        function buildPalette(targetId, type) {
            const target = document.getElementById(targetId);
            if(!target) return;
            const isCustomizable = ['main', 'cylinder', 'tuxedo'].includes(type);
            const getCurrentColor = () => {
                if(type === 'main') return currentMainColor;
                if(type === 'cylinder') return currentCylinderColor;
                if(type === 'tuxedo') return currentTuxedoColor;
                return '#ffffff';
            };
            const setCurrentColor = (hex) => {
                if(type === 'main') { currentMainColor = hex; }
                if(type === 'cylinder') { currentCylinderColor = hex; }
                if(type === 'tuxedo') { currentTuxedoColor = hex; }
            };
            paletteColors.forEach(color => {
                const swatch = document.createElement('div');
                swatch.className = 'color-swatch';
                swatch.style.backgroundColor = color.hex;
                swatch.title = `${color.name} ${color.hex}`;
                
                if(type === 'main' && color.hex === currentMainColor) swatch.classList.add('active');
                if(type === 'cylinder' && color.hex === currentCylinderColor) swatch.classList.add('active');
                if(type === 'tuxedo' && color.hex === currentTuxedoColor) swatch.classList.add('active');

                swatch.onclick = function() {
                    target.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
                    swatch.classList.add('active');
                    if(type === 'main') { currentMainColor = color.hex; }
                    if(type === 'cylinder') { currentCylinderColor = color.hex; }
                    if(type === 'tuxedo') { currentTuxedoColor = color.hex; }
                    refreshLayers();
                };
                target.appendChild(swatch);
            });
            if(isCustomizable) {
                const customInput = document.createElement('input');
                customInput.type = 'color';
                customInput.className = 'custom-color-input';
                customInput.value = getCurrentColor();

                const customSwatch = document.createElement('button');
                customSwatch.type = 'button';
                customSwatch.className = 'color-swatch custom-color-swatch';
                customSwatch.textContent = '自訂';
                customSwatch.title = '自訂顏色';
                if(!paletteColors.some(color => color.hex.toLowerCase() === getCurrentColor().toLowerCase())) {
                    customSwatch.classList.add('active');
                }
                customSwatch.onclick = () => customInput.click();
                customInput.oninput = function() {
                    target.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
                    customSwatch.classList.add('active');
                    setCurrentColor(customInput.value);
                    refreshLayers();
                };
                target.appendChild(customSwatch);
                target.appendChild(customInput);
            }
        }

        const maskImageCache = new Map();

        function loadMaskImage(maskUrl) {
            if (!maskImageCache.has(maskUrl)) {
                maskImageCache.set(maskUrl, new Promise((resolve, reject) => {
                    const image = new Image();
                    image.onload = () => resolve(image);
                    image.onerror = () => reject(new Error(`遮色片載入失敗：${maskUrl}`));
                    image.src = maskUrl;
                }));
            }
            return maskImageCache.get(maskUrl);
        }

        function updateReferenceGallery() {
            const gallery = document.getElementById('reference-gallery');
            const images = [
                document.getElementById('reference-image-1'),
                document.getElementById('reference-image-2'),
                document.getElementById('reference-image-3')
            ];
            const referenceConfigs = {
                cat: {
                    path: 'bags/cat/',
                    fixed: ['cat_01.jpg', 'cat_02.jpg'],
                    bodies: {
                        'OB11': 'cat_ob11.jpg',
                        '黏土娃': 'cat_Nendoroid_Doll.jpg',
                        '10cm': 'cat_10cm.jpg',
                        '20cm': 'cat_20cm.jpg'
                    }
                },
                toast: {
                    path: 'bags/toast/',
                    fixed: ['toast_001.jpg', 'toast_002.jpg'],
                    bodies: {
                        'OB11': 'toast_ob11.jpg',
                        '黏土娃': 'toast_Nendoroid_Doll.jpg',
                        '10cm': 'toast_10cm.jpg',
                        '20cm': 'toast_20cm.jpg'
                    }
                },
                mini_messenger: {
                    path: 'bags/mini_messenger/',
                    fixed: ['mini_messenger_01.jpg', 'mini_messenger_02.jpg'],
                    bodies: {
                        'OB11': 'mini_messenger_ob11.jpg',
                        '黏土娃': 'mini_messenger_Nendoroid_Doll.jpg',
                        '10cm': 'mini_messenger_10cm.jpg',
                        '20cm': 'mini_messenger_20cm.jpg'
                    }
                }
            };
            const referenceConfig = referenceConfigs[bagStyle.value];
            gallery.hidden = !referenceConfig;
            if (!referenceConfig) return;

            images[0].src = `${referenceConfig.path}${referenceConfig.fixed[0]}`;
            images[1].src = `${referenceConfig.path}${referenceConfig.fixed[1]}`;
            const bodyReference = referenceConfig.bodies[subCategory.value];
            const bodyReferenceSlot = images[2].parentElement;
            if (bodyReference) {
                images[2].src = `${referenceConfig.path}${bodyReference}`;
                images[2].style.display = 'block';
                bodyReferenceSlot.style.display = '';
            } else {
                images[2].removeAttribute('src');
                images[2].style.display = 'none';
                bodyReferenceSlot.style.display = 'none';
            }
        }

        async function setMaskLayer(layer, maskUrl, color) {
            const requestKey = `${maskUrl}|${color}`;
            layer.dataset.maskRequest = requestKey;

            try {
                const image = await loadMaskImage(maskUrl);
                if (layer.dataset.maskRequest !== requestKey) return;

                layer.width = image.naturalWidth || 397;
                layer.height = image.naturalHeight || 316;
                const context = layer.getContext('2d');
                context.clearRect(0, 0, layer.width, layer.height);
                context.drawImage(image, 0, 0, layer.width, layer.height);
                context.globalCompositeOperation = 'source-in';
                context.fillStyle = color;
                context.fillRect(0, 0, layer.width, layer.height);
                context.globalCompositeOperation = 'source-over';
            } catch (error) {
                console.error(error);
            }
        }

        function applyStrapPlacement(preset, bagCenterX, bagCenterY, bagWidth, bagHeight, shoulderAnchor = null) {
            const strap = document.getElementById('layer-strap');
            const styleConfig = bagStyleConfigs[bagStyle.value];
            const strapAnchor = styleConfig.strapAnchor;
            const bagAngle = bagCalibration.rotationDeg * Math.PI / 180;
            const localAnchorX = (strapAnchor.xRatio - 0.5) * bagWidth;
            const localAnchorY = (strapAnchor.yRatio - 0.5) * bagHeight;
            const hardwareX = bagCenterX + (localAnchorX * Math.cos(bagAngle)) - (localAnchorY * Math.sin(bagAngle));
            const hardwareY = bagCenterY + (localAnchorX * Math.sin(bagAngle)) + (localAnchorY * Math.cos(bagAngle));
            const baseShoulderX = shoulderAnchor ? shoulderAnchor.x : preset.canvasSizePx * preset.strapShoulderXRatio;
            const baseShoulderY = shoulderAnchor ? shoulderAnchor.y : preset.canvasSizePx * preset.strapShoulderYRatio;
            const lengthRatio = STRAP_LENGTH_RATIOS[subCategory.value] || 1;
            const shoulderX = hardwareX - ((hardwareX - baseShoulderX) * lengthRatio);
            const shoulderY = hardwareY - ((hardwareY - baseShoulderY) * lengthRatio);
            const deltaX = hardwareX - shoulderX;
            const deltaY = hardwareY - shoulderY;
            const strapWidth = STRAP_WIDTH_CM * preset.pxPerCm;

            strap.style.left = `${shoulderX}px`;
            strap.style.top = `${shoulderY - (strapWidth / 2)}px`;
            strap.style.width = `${Math.hypot(deltaX, deltaY)}px`;
            strap.style.height = `${strapWidth}px`;
            strap.style.backgroundColor = styleConfig.strapColor || (bagStyle.value === 'cylinder' ? currentCylinderColor : currentMainColor);
            strap.style.transform = `rotate(${Math.atan2(deltaY, deltaX) * 180 / Math.PI}deg)`;
        }

        function applyBagPlacement() {
            const preset = dollScalePresets[subCategory.value] || dollScalePresets['OB11'];
            const styleConfig = bagStyleConfigs[bagStyle.value];
            const pxPerCm = preset.pxPerCm;
            const widthPx = bagCalibration.sizeCm * pxPerCm;
            const heightPx = widthPx / styleConfig.imageRatio;
            const originX = preset.canvasSizePx * preset.bodyLeftRatio;
            const originY = preset.canvasSizePx * preset.bodyTopRatio;
            const customAnchors = subCategory.value === '自訂尺寸' && typeof window.getCustomBodyAnchors === 'function'
                ? window.getCustomBodyAnchors()
                : null;
            const bagCenterX = customAnchors ? customAnchors.hip.x : originX + (bagCalibration.xCm * pxPerCm);
            const bagCenterY = customAnchors ? customAnchors.hip.y : originY + (bagCalibration.yCm * pxPerCm);
            const leftPx = bagCenterX - (widthPx / 2);
            const topPx = bagCenterY - (heightPx / 2);
            const layerIds = [
                'layer-main-color',
                'layer-tuxedo-color',
                'layer-calico',
                'layer-main-line',
                'layer-tuxedo-line',
                'layer-face',
                'layer-hardware'
            ];

            layerIds.forEach(id => {
                const layer = document.getElementById(id);
                layer.style.width = `${widthPx}px`;
                layer.style.height = `${heightPx}px`;
                layer.style.left = `${leftPx}px`;
                layer.style.top = `${topPx}px`;
                layer.style.transform = `rotate(${bagCalibration.rotationDeg}deg)`;
            });

            applyStrapPlacement(
                preset,
                bagCenterX,
                bagCenterY,
                widthPx,
                heightPx,
                customAnchors ? customAnchors.shoulder : null
            );
        }

        function refreshLayers() {
            // 著色底層 DOM
            const lMainColor = document.getElementById('layer-main-color');
            const lTuxColor = document.getElementById('layer-tuxedo-color');
            const lCalico = document.getElementById('layer-calico');
            
            // 頂層黑色線稿 DOM
            const lMainLine = document.getElementById('layer-main-line');
            const lTuxLine = document.getElementById('layer-tuxedo-line');
            const lFace = document.getElementById('layer-face');
            const lHardware = document.getElementById('layer-hardware');

            if (bagStyle.value === 'toast') {
                lMainColor.style.display = 'none';
                lTuxColor.style.display = 'none';
                lCalico.style.display = 'none';
                lFace.style.display = 'none';
                lMainLine.style.display = 'block';
                lMainLine.className = 'bag-layer';
                lMainLine.src = 'bags/toast/toast_line.png';
                lTuxLine.style.display = 'block';
                lTuxLine.className = 'bag-layer lineart-overlay';
                lTuxLine.src = 'bags/toast/toast_hardware_line.png';
                setMaskLayer(lHardware, 'bags/toast/toast_hardware_mask.png', hardwareColors[currentHardware]);
                applyBagPlacement();
                return;
            }

            if (bagStyle.value === 'mini_messenger') {
                lMainColor.style.display = 'block';
                setMaskLayer(lMainColor, 'bags/mini_messenger/mini_messenger_base_mask.png', currentMainColor);
                lTuxColor.style.display = 'none';
                lCalico.style.display = 'none';
                lFace.style.display = 'none';
                lMainLine.style.display = 'block';
                lMainLine.className = 'bag-layer lineart-overlay';
                lMainLine.src = 'bags/mini_messenger/mini_messenger_line.png';
                lTuxLine.style.display = 'block';
                lTuxLine.className = 'bag-layer lineart-overlay';
                lTuxLine.src = 'bags/mini_messenger/mini_messenger_hardware_line.png';
                setMaskLayer(lHardware, 'bags/mini_messenger/mini_messenger_hardware_mask.png', hardwareColors[currentHardware]);
                applyBagPlacement();
                return;
            }

            if (bagStyle.value === 'cylinder') {
                lMainColor.style.display = 'block';
                setMaskLayer(lMainColor, 'bags/cylinder/cylinder_base_mask.png', currentCylinderColor);
                lTuxColor.style.display = 'none';
                lCalico.style.display = 'none';
                lFace.style.display = 'none';
                lMainLine.style.display = 'block';
                lMainLine.className = 'bag-layer lineart-overlay';
                lMainLine.src = 'bags/cylinder/cylinder_line.png';
                lTuxLine.style.display = 'block';
                lTuxLine.className = 'bag-layer lineart-overlay';
                lTuxLine.src = 'bags/cylinder/cylinder_hardware_line.png';
                setMaskLayer(lHardware, 'bags/cylinder/cylinder_hardware_mask.png', hardwareColors[currentHardware]);
                applyBagPlacement();
                return;
            }

            const imgPath = 'bags/cat/';

            // 主體底色遮色片與共用線稿
            lMainColor.style.display = 'block';
            setMaskLayer(lMainColor, `${imgPath}cat_base_mask.png`, currentMainColor);
            lMainLine.style.display = 'block';
            lMainLine.className = 'bag-layer lineart-overlay';
            lMainLine.src = `${imgPath}cat_line.png`;

            lTuxColor.style.display = 'none';
            lTuxLine.style.display = 'none';
            lTuxLine.className = 'bag-layer lineart-overlay';
            lCalico.style.display = 'none';

            if (currentCatPattern === 'tuxedo') {
                lTuxColor.style.display = 'block';
                setMaskLayer(lTuxColor, `${imgPath}cat_tuxedo_mask.png`, currentTuxedoColor);
                lTuxLine.style.display = 'block';
                lTuxLine.src = `${imgPath}cat_tuxedo_line.png`;
            } else if (currentCatPattern === 'calico') {
                lCalico.style.display = 'block';
                lCalico.src = `${imgPath}cat_calico.png`;
            }

            // 3. 表情加工變色（利用覆蓋全網頁支援的精準反轉色矩陣）
            if (currentExpression === 'face-none') {
                lFace.style.display = 'none';
            } else {
                lFace.style.display = 'block';
                lFace.src = `${imgPath}cat_face_black.png`;
                lFace.className = `bag-layer ${currentExpression}`;
            }

            // 4. 五金遮色片換色
            lHardware.className = 'bag-layer';
            setMaskLayer(lHardware, `${imgPath}cat_hardware_mask.png`, hardwareColors[currentHardware]);

            applyBagPlacement();
        }

        window.onload = function() {
            updateSubCategory();
            handleSkinPresetChange();
        }
    </script>
